name: 🔐 同步 GitHub App Webhook Secret

on:
  workflow_call:
    inputs:
      github_webhook_secret: { required: false, type: string, default: "" }
  workflow_dispatch:
    inputs:
      github_webhook_secret: { required: true, type: string }

run-name: "🔐 同步 GitHub App Webhook Secret"

concurrency:
  group: sync-github-app-webhook-secret-${{ github.repository }}
  cancel-in-progress: false

permissions: {}

jobs:
  sync-secret:
    name: 🔐 同步 GitHub App Webhook Secret
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Sync GitHub secret
        env:
          GH_TOKEN: ${{ secrets.CLAW_SYS_GITHUB_TOKEN }}
          GH_WEBHOOK_SECRET: ${{ inputs.github_webhook_secret || secrets.GH_WEBHOOK_SECRET }}
        run: |
          set -euo pipefail
          gh secret set GH_WEBHOOK_SECRET --repo "${GITHUB_REPOSITORY}" --body "${GH_WEBHOOK_SECRET}"

      - name: Sync Worker secret
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          GITHUB_WEBHOOK_SECRET: ${{ inputs.github_webhook_secret || secrets.GH_WEBHOOK_SECRET }}
          GITHUB_OWNER: ${{ github.repository_owner }}
          GITHUB_REPO: ${{ github.event.repository.name }}
        run: |
          set -euo pipefail
          worker_name="$(printf '%s-%s-claw-worker' "${GITHUB_OWNER}" "${GITHUB_REPO}" | tr '[:upper:]' '[:lower:]')"
          printf '%s' "${GITHUB_WEBHOOK_SECRET}" | npx wrangler secret put GITHUB_WEBHOOK_SECRET --name "${worker_name}"
